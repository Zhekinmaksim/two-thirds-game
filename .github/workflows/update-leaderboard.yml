name: Update Leaderboard Snapshot

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Refresh leaderboard snapshot
        run: npm run update:leaderboard
        env:
          LEADERBOARD_RPC_URL: ${{ secrets.BASE_RPC_URL }}

      - name: Commit snapshot changes
        run: |
          if git diff --quiet -- public/data/leaderboard.json; then
            echo "No leaderboard changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/leaderboard.json
          git commit -m "Update leaderboard snapshot"
          git push
