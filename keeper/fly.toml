app = "two-thirds-keeper-testnet"
primary_region = "ams"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  TICK_SECONDS = "1"
  INCO_PEPPER = "baseSepoliaTestnet"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
